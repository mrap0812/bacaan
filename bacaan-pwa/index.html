<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1816">
  <meta name="description" content="Bacaan: sistem bacaan aktif dengan spaced repetition, catatan bahasa sendiri, uji Feynman, dan target harian. Baca cerdas, ingat lama.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bacaan">
  
  <title>Bacaan – Sistem Bacaan Aktif</title>
  
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1816' width='192' height='192'/><path fill='%23f5f1ed' d='M48 48h96v20H48zm0 30h96v60H48zm0 75h60v12H48z'/></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231a1816' width='180' height='180' rx='40'/><path fill='%23f5f1ed' d='M45 45h90v18H45zm0 27h90v54H45zm0 67h54v11H45z'/></svg>">
  
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <header class="app-header">
      <div class="header-content">
        <div class="brand">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          <span>Bacaan</span>
        </div>
        <nav class="tabs">
          <button data-view="library">📚 Rak</button>
          <button data-view="planner">📅 Planner</button>
          <button data-view="review">⚡ Tinjau</button>
          <button data-view="stats">📊 Wawasan</button>
          <button data-view="method">🧠 Metode</button>
        </nav>
        <div class="header-actions">
          <button id="searchBtn" class="icon-btn" title="Cari (⌘K)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
          </button>
          <button id="addBookBtn" class="icon-btn" title="Tambah buku (N)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button id="installBtn" class="icon-btn hide" title="Pasang aplikasi">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
          </button>
          <button id="themeBtn" class="icon-btn" title="Ganti tema (T)">
            <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
            </svg>
          </button>
          <button id="settingsBtn" class="icon-btn" title="Pengaturan">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m3.08-3.08l4.24-4.24"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main id="view" class="app-view"></main>

    <div id="toast" class="toast"></div>

    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>

  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
